<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Planner Portfolio | HTML Toolset</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-color: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --hover-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }

        /* 사이드바 설정 */
        nav {
            width: 280px;
            background: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
        }

        .profile { padding: 30px 20px; border-bottom: 1px solid #334155; text-align: center; }
        .profile h1 { font-size: 1.2rem; margin-bottom: 5px; color: var(--accent-color); }
        .profile p { font-size: 0.85rem; opacity: 0.7; }

        .menu-list { flex: 1; overflow-y: auto; padding: 20px 10px; }
        .menu-item {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: none;
            border: none;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }
        .menu-item:hover { background: var(--hover-color); }
        .menu-item.active { background: var(--accent-color); color: var(--bg-color); font-weight: bold; }

        /* 메인 콘텐츠 영역 (Iframe) */
        main { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* 로딩 상태 표시용 */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<nav>
    <div class="profile">
        <h1>HTML Tools</h1>
        <p>by HJ</p>
    </div>
    <div class="menu-list" id="menu">
        <button class="menu-item active" onclick="loadPage(this, 'image_check_alpha.html')">🖼️ 이미지(png) 알파체크</button>
        <button class="menu-item" onclick="loadPage(this, 'webm_alpha-check.html')">🎞️ 동영상(webm) 알파체크</button>
        <button class="menu-item" onclick="loadPage(this, 'Json2excel.html')">📊 Json to excel</button>
        <button class="menu-item" onclick="loadPage(this, 'xml2excel.html')">📄 xml to excel</button>
        <button class="menu-item" onclick="loadPage(this, 'excel_comparison4.html')">🗳️ 엑셀 문서 차이점 비교</button>
        <button class="menu-item active" onclick="loadPage(this, 'home.html')">가이드</button>
    </div>
</nav>

<main>
    <iframe id="content-frame" src="home.html"></iframe>
</main>

<script>
    function loadPage(element, url) {
        // 프레임 소스 변경
        document.getElementById('content-frame').src = url;

        // 버튼 활성화 스타일 제어
        const buttons = document.querySelectorAll('.menu-item');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
    }
</script>

</body>
</html>
